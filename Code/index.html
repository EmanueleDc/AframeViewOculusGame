<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Arena Vista 3D</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
      #info-panel {
        position: fixed;
        top: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 16px;
        z-index: 999;
        min-width: 200px;
      }
      #info-panel h3 {
        margin: 0 0 10px 0;
        color: #00ff88;
        font-size: 18px;
      }
      .info-row {
        margin: 5px 0;
        display: flex;
        justify-content: space-between;
      }
      .info-label { color: #aaaaaa; }
      .info-value { color: #ffffff; font-weight: bold; }
      #stato-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: bold;
        background: #00aa44;
      }
      #reset-btn {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        background: #0066ff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
      }
      #reset-btn:hover { background: #0044cc; }
      #istruzioni {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.5);
        color: #aaaaaa;
        padding: 10px;
        border-radius: 8px;
        font-family: Arial, sans-serif;
        font-size: 12px;
        z-index: 999;
      }
      #connessione-status {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 8px 15px;
        border-radius: 20px;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        z-index: 999;
        background: #aa0000;
        color: white;
      }
      #connessione-status.connesso { background: #00aa44; }
    </style>
  </head>

  <body>

    <div id="info-panel">
      <h3>🏀 Arena Info</h3>
      <div class="info-row">
        <span class="info-label">Punti:</span>
        <span class="info-value" id="ui-punti">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Stato:</span>
        <span id="stato-badge">PLAY</span>
      </div>
      <div class="info-row">
        <span class="info-label">Player X:</span>
        <span class="info-value" id="ui-player-x">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Player Z:</span>
        <span class="info-value" id="ui-player-z">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Palla X:</span>
        <span class="info-value" id="ui-palla-x">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Palla Z:</span>
        <span class="info-value" id="ui-palla-z">0</span>
      </div>
      <button id="reset-btn" onclick="resetCamera()">🎥 Reset Camera</button>
    </div>

    <div id="connessione-status">● Disconnesso</div>

    <div id="istruzioni">
      🖱️ Click sinistro + trascina → Ruota & Inclina vista<br>
      🖱️ Scroll → Zoom avanti/indietro<br>
      ⌨️ R → Reset camera
    </div>

    <a-scene background="color: #1a1a2e">

      <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
      <a-light type="directional" position="10 20 10" intensity="0.8"></a-light>

      <!-- Pavimento -->
      <a-box position="3 0 -3.5" width="30" height="0.5" depth="30" color="#9c3e27"></a-box>

      <!-- Muri -->
      <a-box position="3 1.5 -18.5" width="30" height="3" depth="0.5" color="#3a3a3a"></a-box>
      <a-box position="3 3 11.5" width="30" height="6" depth="0.5" color="#3a3a3a"></a-box>
      <a-box position="-12 1.5 -3.5" width="0.5" height="3" depth="30" color="#3a3a3a"></a-box>
      <a-box position="18 1.5 -3.5" width="0.5" height="3" depth="30" color="#3a3a3a"></a-box>

      <!-- Player -->
      <a-cylinder id="player" position="0 1 0" radius="0.5" height="2" color="#0066ff"></a-cylinder>

      <!-- Palla -->
      <a-sphere id="palla" position="1 1 1" radius="0.5" color="#ff4400"></a-sphere>

      <!-- Palo canestro -->
      <a-cylinder position="6 2 10" radius="0.15" height="4" color="#888888"></a-cylinder>

      <!-- Tabellone -->
      <a-box position="6 4.5 10" width="3" height="2" depth="0.2" color="#9c3e27"></a-box>

      <!-- CAMERA CON DOPPIO PIVOT PER ORBITA 3D COMPLETA -->
      <a-entity id="pivot-orizzontale" position="0 0 0">
        <a-entity id="pivot-verticale" position="0 0 0">
          <a-camera
            id="main-camera"
            position="0 0 35"
            fov="60"
            look-controls-enabled="false"
            wasd-controls-enabled="false">
          </a-camera>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const BROKER_IP = "192.168.66.111";
      const BROKER_PORT = 9001;
      const CLIENT_ID = "aframe_" + Math.random().toString(16).substr(2, 8);

      const playerEl = document.getElementById("player");
      const pallaEl = document.getElementById("palla");
      const uiPunti = document.getElementById("ui-punti");
      const uiStatoBadge = document.getElementById("stato-badge");
      const uiPlayerX = document.getElementById("ui-player-x");
      const uiPlayerZ = document.getElementById("ui-player-z");
      const uiPallaX = document.getElementById("ui-palla-x");
      const uiPallaZ = document.getElementById("ui-palla-z");
      const statusEl = document.getElementById("connessione-status");


      // GESTIONE CAMERA
      const pivotOrizzontale = document.getElementById("pivot-orizzontale");
      const pivotVerticale = document.getElementById("pivot-verticale");
      const cameraEl = document.getElementById("main-camera");

      let rotazioneOrizzontale = 0;   // Ruota attorno al campo (sinistra/destra)
      let inclinazioneVerticale = 30; // Alzata/abbassata della vista (30° iniziale)
      let distanza = 35;              // Zoom (distanza fisica dal centro)

      const INCLINAZIONE_MIN = 5;     // Limite: quasi a livello del campo
      const INCLINAZIONE_MAX = 85;    // Limite: quasi del tutto dall'alto
      const DIST_MIN = 10;            // Zoom massimo vicino
      const DIST_MAX = 60;            // Zoom massimo lontano

      let isDragging = false;
      let lastMouseX = 0;
      let lastMouseY = 0;

      function aggiornaCamera() {
        // Rotazione orizzontale (Giro attorno al centro)
        pivotOrizzontale.setAttribute("rotation", `0 ${rotazioneOrizzontale} 0`);
        
        // Inclinazione verticale (Su / Giù)
        pivotVerticale.setAttribute("rotation", `-${inclinazioneVerticale} 0 0`);
        
        // Imposta la distanza (zoom)
        cameraEl.setAttribute("position", `0 0 ${distanza}`);
        
        // Sguardo sempre puntato al centro dell'arena (0,0,0)
        if (cameraEl.getObject3D('camera')) {
          cameraEl.getObject3D('camera').lookAt(0, 0, 0);
        }
      }

      // Attende il caricamento di A-Frame per la prima inquadratura
      cameraEl.addEventListener('loaded', () => {
        aggiornaCamera();
      });
       
      // click del mouse
      document.addEventListener("mousedown", function(e) {
        if (e.button === 0) {
          isDragging = true;
          lastMouseX = e.clientX;
          lastMouseY = e.clientY;
        }
      });

      // rilascio del mouse
      document.addEventListener("mouseup", function() {
        isDragging = false;
      });

      // spostamento del mouse
      document.addEventListener("mousemove", function(e) {
        if (!isDragging) return; // Se NON stai tenendo premuto il tasto sinistro esce

        // Calcola di quanti pixel si è mosso il cursore dall'ultimo frame
        const deltaX = e.clientX - lastMouseX;
        const deltaY = e.clientY - lastMouseY;

        // Modifica gli angoli della camera (sensibilità = 0.3)
        rotazioneOrizzontale -= deltaX * 0.3;
        inclinazioneVerticale += deltaY * 0.3;

        // Limita l'inclinazione per non andare sotto terra o capovolgere la visuale
        inclinazioneVerticale = Math.max(INCLINAZIONE_MIN, Math.min(INCLINAZIONE_MAX, inclinazioneVerticale));

        // Aggiorna le posizioni per il prossimo spostamento
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        // si applicano i cambiamenti nella scena
        aggiornaCamera();
      });

      document.addEventListener("wheel", function(e) {
        distanza += e.deltaY * 0.03; // e.deltaY misura la velocità/direzione della rotellina
        distanza = Math.max(DIST_MIN, Math.min(DIST_MAX, distanza));
        aggiornaCamera();
      });

      document.addEventListener("keydown", function(e) {
        if (e.key === "r" || e.key === "R") resetCamera();
      });

      // Previene il menu contestuale del tasto destro del mouse per non rovinare la scena
      document.addEventListener("contextmenu", function(e) {
        e.preventDefault();
      });

      function resetCamera() {
        rotazioneOrizzontale = 0;
        inclinazioneVerticale = 30;
        distanza = 35;
        aggiornaCamera();
      }

  
      // MQTT
      const client = new Paho.MQTT.Client(BROKER_IP, BROKER_PORT, CLIENT_ID);

      client.onMessageArrived = function(message) {
        const topic = message.destinationName; // nome del canale
        let payload;
        try { // converte json in oggetto js leggibile
          payload = JSON.parse(message.payloadString);
        } catch(e) { return; }

        if (topic === "unity/player/position") {
          playerEl.setAttribute("position", {x: payload.x, y: payload.y, z: payload.z});
          uiPlayerX.textContent = payload.x.toFixed(2);
          uiPlayerZ.textContent = payload.z.toFixed(2);
        }
        else if (topic === "unity/palla/position") {
          pallaEl.setAttribute("position", {x: payload.x, y: payload.y, z: payload.z});
          uiPallaX.textContent = payload.x.toFixed(2);
          uiPallaZ.textContent = payload.z.toFixed(2);
        }
        else if (topic === "unity/game/score") {
          uiPunti.textContent = payload.punteggio;
        }
        else if (topic === "unity/game/state") {
          if (payload.stato === "play") {
            uiStatoBadge.textContent = "PLAY";
            uiStatoBadge.style.background = "#00aa44";
          } else {
            uiStatoBadge.textContent = "PAUSA";
            uiStatoBadge.style.background = "#aa4400";
          }
        }
      };

      client.onConnectionLost = function() {
        statusEl.textContent = "● Disconnesso";
        statusEl.className = "";
        setTimeout(connetti, 3000);
      };

      function connetti() {
        client.connect({
          onSuccess: function() {
            statusEl.textContent = "● Connesso";
            statusEl.className = "connesso";
            client.subscribe("unity/player/position");
            client.subscribe("unity/palla/position");
            client.subscribe("unity/game/score");
            client.subscribe("unity/game/state");
          },
          onFailure: function() {
            statusEl.textContent = "● Disconnesso";
            statusEl.className = "";
            setTimeout(connetti, 3000);
          },
          useSSL: false
        });
      }

      connetti();
    </script>

  </body>
</html>
